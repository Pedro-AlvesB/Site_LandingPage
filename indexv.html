<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Lar do Caminho</title>
        <link rel="stylesheet" href="lar_do_caminho.css" />
    </head>
<body>
    <header>
        <div class="header-decoracao">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <div class="logo-wrapper">
            <img src="logo-lar-do-caminho.png" alt="Lar do Caminho" />
        </div>
  </header>
  <nav>
    <div class="nav-links">
        <span>Início</span>
        <span>Nossa História</span>
        <span>Nossos parceiros</span>
    </div>
    <button class="btn-quero-doar">Quero doar</button>
  </nav>
  <main>
    <section class="hero">

      <div class="hero-texto">
        <h1>
          Formar cidadãos íntegros,<br>
          <span class="destaque">independentes</span> e engajados.
        </h1>
        <p class="hero-desc">
          Ajudamos crianças e adolescentes em situação de vulnerabilidade
          a construir um futuro com dignidade, amor e fraternidade.
        </p>
        <div class="hero-acoes">
          <button class="btn-saiba-mais">Saiba mais</button>
          <div class="hero-telefone">
            <span class="icone-tel"></span>
            <span>(11) 97929-0495</span>
          </div>
        </div>
      </div>

      <div class="hero-imagem">
        <img src="crianca-hero.png" alt="Criança sorrindo" />
      </div>

    </section>
  </main>
</body>
</html>
